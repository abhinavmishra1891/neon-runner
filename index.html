<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON PARKOUR</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #wrapper {
    position: relative;
    width: 390px;
    height: 693px;
    max-height: 100vh;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }
  #ui-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #hook-text {
    position: absolute;
    top: 60px; left: 0; right: 0;
    text-align: center;
    font-family: 'Georgia', serif;
    font-size: 18px;
    color: rgba(255,255,255,0.95);
    text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.5s;
    padding: 0 20px;
  }
  #lyrics-display {
    position: absolute;
    bottom: 160px; left: 0; right: 0;
    text-align: center;
    font-family: 'Georgia', serif;
    font-size: 20px;
    font-style: italic;
    color: #fff;
    text-shadow: 0 0 30px #f0f, 0 0 60px #f0f, 0 0 90px #f0f;
    letter-spacing: 2px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s, transform 0.4s;
    padding: 0 30px;
  }
  #score-display {
    position: absolute;
    top: 24px; right: 20px;
    font-size: 13px;
    color: #0ff;
    text-shadow: 0 0 10px #0ff;
    letter-spacing: 3px;
    font-family: 'Courier New', monospace;
    opacity: 0.9;
  }
  #mode-badge {
    position: absolute;
    top: 24px; left: 20px;
    font-size: 10px;
    color: #f0f;
    text-shadow: 0 0 10px #f0f;
    letter-spacing: 4px;
    font-family: 'Courier New', monospace;
    border: 1px solid rgba(255,0,255,0.3);
    padding: 3px 8px;
  }
  #controls-hint {
    position: absolute;
    bottom: 30px; left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    color: rgba(0,255,255,0.5);
    letter-spacing: 3px;
    font-family: 'Courier New', monospace;
  }
  #music-loader {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 12px 20px;
    background: rgba(0,0,0,0.8);
    border-top: 1px solid rgba(0,255,255,0.2);
    display: flex;
    align-items: center;
    gap: 10px;
    pointer-events: all;
  }
  #music-loader label {
    font-size: 9px;
    color: rgba(0,255,255,0.6);
    letter-spacing: 2px;
    white-space: nowrap;
    cursor: pointer;
    border: 1px solid rgba(0,255,255,0.3);
    padding: 4px 10px;
    transition: all 0.2s;
  }
  #music-loader label:hover { color: #0ff; border-color: #0ff; }
  #music-loader input { display: none; }
  #music-status {
    font-size: 9px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #mode-toggle {
    font-size: 9px;
    color: rgba(255,0,255,0.6);
    letter-spacing: 2px;
    border: 1px solid rgba(255,0,255,0.3);
    padding: 4px 10px;
    cursor: pointer;
    background: none;
    font-family: 'Courier New', monospace;
    transition: all 0.2s;
    pointer-events: all;
  }
  #mode-toggle:hover { color: #f0f; border-color: #f0f; }
  #slowmo-flash {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, rgba(0,255,255,0.05) 0%, transparent 70%);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  #death-screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
  }
  #death-screen.visible { opacity: 1; pointer-events: all; }
  #death-title {
    font-size: 36px;
    color: #f0f;
    text-shadow: 0 0 20px #f0f, 0 0 40px #f0f;
    letter-spacing: 8px;
    font-family: 'Courier New', monospace;
    animation: flicker 1.5s infinite;
  }
  #death-score { font-size: 13px; color: #0ff; letter-spacing: 4px; }
  #restart-btn {
    font-size: 10px;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.4);
    padding: 10px 28px;
    cursor: pointer;
    background: none;
    font-family: 'Courier New', monospace;
    letter-spacing: 4px;
    transition: all 0.3s;
    pointer-events: all;
    margin-top: 10px;
  }
  #restart-btn:hover { border-color: #0ff; color: #0ff; text-shadow: 0 0 10px #0ff; }
  @keyframes flicker {
    0%,100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.3; }
    94% { opacity: 1; }
    96% { opacity: 0.5; }
    97% { opacity: 1; }
  }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="gameCanvas" width="390" height="693"></canvas>
  <div id="ui-overlay">
    <div id="mode-badge">GAME MODE</div>
    <div id="score-display">000000</div>
    <div id="hook-text"></div>
    <div id="lyrics-display"></div>
    <div id="slowmo-flash"></div>
    <div id="controls-hint">SPACE / TAP — JUMP &nbsp;|&nbsp; DOUBLE-TAP — DASH</div>
    <div id="death-screen">
      <div id="death-title">FELL OFF</div>
      <div id="death-score"></div>
      <button id="restart-btn" onclick="restartGame()">[ RESTART ]</button>
    </div>
  </div>
  <div id="music-loader">
    <label for="musicFile">♪ LOAD MUSIC</label>
    <input type="file" id="musicFile" accept="audio/*" onchange="loadMusic(this)">
    <span id="music-status">no track loaded</span>
    <button id="mode-toggle" onclick="toggleMode()">CONTENT MODE</button>
  </div>
</div>

<script>
// ============================================================
//  CONFIG — EDIT ME FREELY
// ============================================================
const CONFIG = {
  mode: "game",           // "game" | "content"
  speed: 4.2,             // base horizontal speed (px/frame)
  gravity: 0.55,
  jumpForce: -13.5,
  colors: {
    bg:       "#050510",
    ground:   "#0ff",
    platform: "#f0f",
    player:   "#0ff",
    trail:    "#f0f",
    star:     "#ffffff",
  },
  hookText:  "POV: this song hits at 2AM",
  hookDuration: 3000,   // ms
  lyrics: [
    // { time: 0, text: "Your lyric here" },
    // { time: 4, text: "Next lyric" },
  ],
  nearMissWindow:  28,   // px — triggers slo-mo if this close to edge
  dashForce:       5.5,
  dashCooldown:    900,  // ms
};
// ============================================================

const canvas  = document.getElementById("gameCanvas");
const ctx     = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;

// ── Audio ──────────────────────────────────────────────────
let audioCtx, audioSource, audioBuffer, audioStartTime = 0, audioOffset = 0;
let musicPlaying = false;

function loadMusic(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById("music-status").textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.decodeAudioData(e.target.result, buf => {
      audioBuffer = buf;
      playMusic();
    });
  };
  reader.readAsArrayBuffer(file);
}

function playMusic(offset = 0) {
  if (!audioBuffer || !audioCtx) return;
  if (audioSource) { try { audioSource.stop(); } catch(e){} }
  audioSource = audioCtx.createBufferSource();
  audioSource.buffer = audioBuffer;
  audioSource.connect(audioCtx.destination);
  audioSource.loop = true;
  audioSource.start(0, offset);
  audioStartTime = audioCtx.currentTime - offset;
  musicPlaying = true;
}

function getMusicTime() {
  if (!audioCtx || !musicPlaying) return 0;
  return audioCtx.currentTime - audioStartTime;
}

// ── State ─────────────────────────────────────────────────
let mode = CONFIG.mode;
let score = 0, bestScore = 0;
let dead = false;
let gameTime = 0;
let lastTime = 0;

// Time scale for slo-mo
let timeScale = 1;
let slowMoTimer = 0;

// ── Player ────────────────────────────────────────────────
const PLAYER = {
  x: 90, y: 0,
  w: 22, h: 28,
  vx: 0, vy: 0,
  onGround: false,
  jumpsLeft: 2,
  dashCooldown: 0,
  dashing: false,
  dashTimer: 0,
  trail: [],
  glowPulse: 0,
};

// ── Camera ────────────────────────────────────────────────
let camX = 0, camXTarget = 0;
let camY = 0, camYTarget = 0;
const CAM_LAG = 0.07;

// ── Platforms ─────────────────────────────────────────────
let platforms = [];
let worldSpeed = CONFIG.speed;

// ── Particles ─────────────────────────────────────────────
let particles = [];

// ── Stars ─────────────────────────────────────────────────
const STARS = Array.from({length: 120}, () => ({
  x: Math.random() * W,
  y: Math.random() * H * 0.75,
  r: Math.random() * 1.5 + 0.3,
  alpha: Math.random() * 0.7 + 0.2,
  speed: Math.random() * 0.3 + 0.05,
}));

// ── Lyrics ────────────────────────────────────────────────
let lastLyricIndex = -1;
let lyricVisible = false;
let lyricTimer = 0;

// ── Hook text ─────────────────────────────────────────────
let hookVisible = false;
let hookTimer = 0;

// ── Neon scanlines ────────────────────────────────────────
let scanlineOffset = 0;

// ─────────────────────────────────────────────────────────
//  PLATFORM GENERATION
// ─────────────────────────────────────────────────────────
const GROUND_Y = H - 90;

function makePlatform(x, y, w) {
  return { x, y, w, h: 10, alive: true };
}

function initPlatforms() {
  platforms = [];
  // Ground segment at start
  platforms.push(makePlatform(-200, GROUND_Y, 900));
  // Scatter some starter platforms
  let px = 600;
  for (let i = 0; i < 12; i++) {
    const gap = 140 + Math.random() * 120;
    const dy = (Math.random() - 0.5) * 200;
    const py = Math.min(GROUND_Y, Math.max(H * 0.28, GROUND_Y + dy));
    const pw = 100 + Math.random() * 100;
    platforms.push(makePlatform(px, py, pw));
    px += pw + gap;
  }
}

function extendPlatforms() {
  // Find rightmost platform
  let rightmost = 0;
  for (const p of platforms) rightmost = Math.max(rightmost, p.x + p.w);

  const screenRight = camXTarget + W + 300;
  while (rightmost < screenRight) {
    const gap = 120 + Math.random() * 140 + Math.min(60, gameTime * 0.4);
    const dy = (Math.random() - 0.5) * 230;
    const py = Math.min(GROUND_Y, Math.max(H * 0.24, GROUND_Y + dy));
    const pw = 90 + Math.random() * 110 - Math.min(40, gameTime * 0.3);
    platforms.push(makePlatform(rightmost + gap, py, pw));
    rightmost += pw + gap;
  }
}

function prunePlatforms() {
  platforms = platforms.filter(p => p.x + p.w > camXTarget - 200);
}

// ─────────────────────────────────────────────────────────
//  PHYSICS
// ─────────────────────────────────────────────────────────
function updatePlayer(dt) {
  const ts = timeScale;
  const dtS = dt * ts;

  // Dash
  if (PLAYER.dashing) {
    PLAYER.dashTimer -= dt;
    if (PLAYER.dashTimer <= 0) { PLAYER.dashing = false; PLAYER.vx = worldSpeed; }
  }
  if (PLAYER.dashCooldown > 0) PLAYER.dashCooldown -= dt;

  // Gravity
  PLAYER.vy += CONFIG.gravity * ts;
  if (PLAYER.vy > 22) PLAYER.vy = 22;

  // Move
  PLAYER.x += PLAYER.vx * ts;
  PLAYER.y += PLAYER.vy * ts;

  // Trail
  PLAYER.trail.push({ x: PLAYER.x + PLAYER.w / 2, y: PLAYER.y + PLAYER.h / 2, alpha: 1 });
  if (PLAYER.trail.length > 20) PLAYER.trail.shift();
  PLAYER.trail.forEach(t => t.alpha -= 0.05);

  PLAYER.glowPulse += 0.08;

  // Collision with platforms
  PLAYER.onGround = false;
  const px = PLAYER.x, py = PLAYER.y, pw = PLAYER.w, ph = PLAYER.h;
  const FORGIVE = 8; // subtle collision forgiveness

  for (const plat of platforms) {
    const prevBottom = py - PLAYER.vy * ts + ph;
    const currBottom = py + ph;

    // Horizontal overlap (with slight forgiveness)
    const hOverlap = px + pw - FORGIVE > plat.x && px + FORGIVE < plat.x + plat.w;

    if (hOverlap && prevBottom <= plat.y + 4 && currBottom >= plat.y) {
      // Near-miss slo-mo detection
      const leftEdgeDist  = Math.abs((px + FORGIVE) - plat.x);
      const rightEdgeDist = Math.abs((px + pw - FORGIVE) - (plat.x + plat.w));
      if ((leftEdgeDist < CONFIG.nearMissWindow || rightEdgeDist < CONFIG.nearMissWindow) && timeScale === 1) {
        triggerSlowMo(0.35, 600);
      }

      PLAYER.y = plat.y - ph;
      PLAYER.vy = 0;
      PLAYER.onGround = true;
      PLAYER.jumpsLeft = 2;
      spawnLandParticles();
    }
  }

  // Death
  if (PLAYER.y > H + 100) {
    if (mode === "content") {
      respawnPlayer();
    } else {
      triggerDeath();
    }
  }
}

function respawnPlayer() {
  PLAYER.x = camXTarget + 80;
  PLAYER.y = GROUND_Y - 200;
  PLAYER.vy = 0;
  PLAYER.vx = worldSpeed;
  PLAYER.jumpsLeft = 2;
  PLAYER.dashing = false;
  PLAYER.trail = [];
}

function triggerDeath() {
  if (dead) return;
  dead = true;
  if (score > bestScore) bestScore = score;
  document.getElementById("death-score").textContent =
    `SCORE: ${Math.floor(score)}  ─  BEST: ${Math.floor(bestScore)}`;
  const ds = document.getElementById("death-screen");
  ds.style.background = "rgba(0,0,0,0.8)";
  ds.classList.add("visible");
}

function restartGame() {
  dead = false;
  score = 0;
  gameTime = 0;
  worldSpeed = CONFIG.speed;
  PLAYER.x = 90; PLAYER.y = GROUND_Y - 100;
  PLAYER.vx = worldSpeed; PLAYER.vy = 0;
  PLAYER.onGround = false; PLAYER.jumpsLeft = 2;
  PLAYER.dashing = false; PLAYER.trail = [];
  camX = 0; camXTarget = 0; camY = 0; camYTarget = 0;
  particles = [];
  initPlatforms();
  document.getElementById("death-screen").classList.remove("visible");
  document.getElementById("death-screen").style.background = "";
  lastLyricIndex = -1;
  showHookText();
  if (audioCtx && !musicPlaying) playMusic();
}

// ─────────────────────────────────────────────────────────
//  SLOW-MO
// ─────────────────────────────────────────────────────────
function triggerSlowMo(scale, durationMs) {
  timeScale = scale;
  slowMoTimer = durationMs;
  document.getElementById("slowmo-flash").style.opacity = "1";
  setTimeout(() => document.getElementById("slowmo-flash").style.opacity = "0", 200);
}

// ─────────────────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────────────────
let lastTap = 0;

function doJump() {
  if (dead) return;
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  if (PLAYER.jumpsLeft > 0) {
    PLAYER.vy = CONFIG.jumpForce * (PLAYER.onGround ? 1 : 0.85);
    PLAYER.jumpsLeft--;
    spawnJumpParticles();
    timeScale = 1; // cancel slo-mo on intentional jump
    slowMoTimer = 0;
  }
}

function doDash() {
  if (dead) return;
  if (PLAYER.dashCooldown > 0) return;
  PLAYER.dashing = true;
  PLAYER.dashTimer = 200;
  PLAYER.vx = worldSpeed + CONFIG.dashForce;
  PLAYER.dashCooldown = CONFIG.dashCooldown;
  spawnDashParticles();
}

document.addEventListener("keydown", e => {
  if (e.code === "Space" || e.code === "ArrowUp") { e.preventDefault(); doJump(); }
  if (e.code === "KeyD" || e.code === "ShiftLeft") doDash();
  if (e.code === "KeyR") restartGame();
});

canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  const now = Date.now();
  if (now - lastTap < 280) { doDash(); lastTap = 0; }
  else { doJump(); lastTap = now; }
}, { passive: false });

canvas.addEventListener("mousedown", e => {
  const now = Date.now();
  if (now - lastTap < 280) { doDash(); lastTap = 0; }
  else { doJump(); lastTap = now; }
});

// ─────────────────────────────────────────────────────────
//  PARTICLES
// ─────────────────────────────────────────────────────────
function spawnLandParticles() {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x: PLAYER.x + PLAYER.w / 2,
      y: PLAYER.y + PLAYER.h,
      vx: (Math.random() - 0.5) * 4,
      vy: -Math.random() * 3 - 1,
      alpha: 1, r: Math.random() * 3 + 1,
      color: CONFIG.colors.platform,
      life: 400,
    });
  }
}

function spawnJumpParticles() {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: PLAYER.x + PLAYER.w / 2 + (Math.random() - 0.5) * 20,
      y: PLAYER.y + PLAYER.h,
      vx: (Math.random() - 0.5) * 5,
      vy: Math.random() * 2 + 1,
      alpha: 1, r: Math.random() * 2 + 1,
      color: CONFIG.colors.player,
      life: 350,
    });
  }
}

function spawnDashParticles() {
  for (let i = 0; i < 14; i++) {
    particles.push({
      x: PLAYER.x + (Math.random() - 0.5) * PLAYER.w,
      y: PLAYER.y + Math.random() * PLAYER.h,
      vx: -Math.random() * 7 - 2,
      vy: (Math.random() - 0.5) * 2,
      alpha: 1, r: Math.random() * 3 + 1,
      color: "#ff0",
      life: 300,
    });
  }
}

function updateParticles(dt) {
  for (const p of particles) {
    p.x += p.vx * timeScale;
    p.y += p.vy * timeScale;
    p.vy += 0.12 * timeScale;
    p.alpha -= (dt / p.life) * 2;
  }
  particles = particles.filter(p => p.alpha > 0);
}

// ─────────────────────────────────────────────────────────
//  CAMERA
// ─────────────────────────────────────────────────────────
function updateCamera() {
  camXTarget = PLAYER.x - 100;
  const playerRelY = PLAYER.y / H;
  camYTarget = (playerRelY - 0.5) * 80;
  camX += (camXTarget - camX) * CAM_LAG;
  camY += (camYTarget - camY) * CAM_LAG * 0.6;
}

// ─────────────────────────────────────────────────────────
//  LYRICS + HOOK
// ─────────────────────────────────────────────────────────
function showHookText() {
  const el = document.getElementById("hook-text");
  el.textContent = CONFIG.hookText;
  el.style.opacity = "1";
  hookVisible = true;
  hookTimer = CONFIG.hookDuration;
}

function updateLyrics(dt) {
  // Hook
  if (hookVisible) {
    hookTimer -= dt;
    if (hookTimer <= 0) {
      hookVisible = false;
      const el = document.getElementById("hook-text");
      el.style.opacity = "0";
    }
  }

  // Lyrics
  if (CONFIG.lyrics.length === 0) return;
  const t = getMusicTime();
  for (let i = 0; i < CONFIG.lyrics.length; i++) {
    const l = CONFIG.lyrics[i];
    const next = CONFIG.lyrics[i + 1];
    const end = next ? next.time - 0.3 : l.time + 3;
    if (t >= l.time && t < end && lastLyricIndex !== i) {
      lastLyricIndex = i;
      showLyric(l.text);
    }
  }
  if (lyricVisible) {
    lyricTimer -= dt;
    if (lyricTimer <= 0) hideLyric();
  }
}

function showLyric(text) {
  const el = document.getElementById("lyrics-display");
  el.textContent = text;
  el.style.opacity = "1";
  el.style.transform = "translateY(0)";
  lyricVisible = true;
  lyricTimer = 2800;
}

function hideLyric() {
  lyricVisible = false;
  const el = document.getElementById("lyrics-display");
  el.style.opacity = "0";
  el.style.transform = "translateY(10px)";
}

// ─────────────────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────────────────
function render() {
  // Background
  ctx.fillStyle = CONFIG.colors.bg;
  ctx.fillRect(0, 0, W, H);

  // Grid lines (subtle perspective)
  drawGrid();

  ctx.save();
  ctx.translate(-camX, -camY);

  // Stars (fixed in world but slow parallax)
  drawStars();

  // Platforms
  for (const p of platforms) {
    drawPlatform(p);
  }

  // Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.shadowBlur = 12;
    ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Trail
  for (let i = 0; i < PLAYER.trail.length; i++) {
    const t = PLAYER.trail[i];
    const a = Math.max(0, t.alpha * 0.7);
    const r = (i / PLAYER.trail.length) * 6;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.shadowBlur = 15;
    ctx.shadowColor = CONFIG.colors.trail;
    ctx.fillStyle = CONFIG.colors.trail;
    ctx.beginPath();
    ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Player
  drawPlayer();

  ctx.restore();

  // Scanline effect
  drawScanlines();

  // Vignette
  drawVignette();

  // Score
  if (mode === "game" && !dead) {
    document.getElementById("score-display").textContent =
      String(Math.floor(score)).padStart(6, "0");
  }
}

function drawGrid() {
  ctx.save();
  ctx.strokeStyle = "rgba(0,255,255,0.04)";
  ctx.lineWidth = 1;
  const spacing = 60;
  const offX = (camX * 0.3) % spacing;
  for (let x = -offX; x < W + spacing; x += spacing) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  const offY = (camY * 0.3) % spacing;
  for (let y = -offY; y < H + spacing; y += spacing) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  ctx.restore();
}

function drawStars() {
  for (const s of STARS) {
    const sx = ((s.x - camX * s.speed * 0.3) % (W + 100) + W + 100) % (W + 100);
    ctx.save();
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = "#fff";
    ctx.shadowBlur = 4;
    ctx.shadowColor = "#fff";
    ctx.beginPath();
    ctx.arc(sx + camX, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawPlatform(p) {
  const grd = ctx.createLinearGradient(p.x, p.y, p.x + p.w, p.y + p.h);
  grd.addColorStop(0, "#f0f");
  grd.addColorStop(0.5, "#fff");
  grd.addColorStop(1, "#f0f");

  ctx.save();
  // Glow
  ctx.shadowBlur = 18;
  ctx.shadowColor = CONFIG.colors.platform;
  ctx.fillStyle = grd;
  ctx.fillRect(p.x, p.y, p.w, p.h);

  // Top glow line
  ctx.shadowBlur = 30;
  ctx.shadowColor = "#fff";
  ctx.fillStyle = "rgba(255,255,255,0.9)";
  ctx.fillRect(p.x, p.y, p.w, 2);

  // Underside glow
  const ug = ctx.createLinearGradient(p.x, p.y + p.h, p.x, p.y + p.h + 12);
  ug.addColorStop(0, "rgba(255,0,255,0.3)");
  ug.addColorStop(1, "rgba(255,0,255,0)");
  ctx.shadowBlur = 0;
  ctx.fillStyle = ug;
  ctx.fillRect(p.x, p.y + p.h, p.w, 12);

  ctx.restore();
}

function drawPlayer() {
  const px = PLAYER.x, py = PLAYER.y, pw = PLAYER.w, ph = PLAYER.h;
  const pulse = Math.sin(PLAYER.glowPulse) * 0.3 + 0.7;

  ctx.save();
  ctx.shadowBlur = 30 * pulse;
  ctx.shadowColor = CONFIG.colors.player;

  // Body
  const grd = ctx.createLinearGradient(px, py, px, py + ph);
  grd.addColorStop(0, "#0ff");
  grd.addColorStop(1, "#08f");
  ctx.fillStyle = grd;

  // Rounded rect
  const r = 5;
  ctx.beginPath();
  ctx.moveTo(px + r, py);
  ctx.lineTo(px + pw - r, py);
  ctx.quadraticCurveTo(px + pw, py, px + pw, py + r);
  ctx.lineTo(px + pw, py + ph - r);
  ctx.quadraticCurveTo(px + pw, py + ph, px + pw - r, py + ph);
  ctx.lineTo(px + r, py + ph);
  ctx.quadraticCurveTo(px, py + ph, px, py + ph - r);
  ctx.lineTo(px, py + r);
  ctx.quadraticCurveTo(px, py, px + r, py);
  ctx.closePath();
  ctx.fill();

  // Inner highlight
  ctx.shadowBlur = 0;
  ctx.fillStyle = "rgba(255,255,255,0.35)";
  ctx.fillRect(px + 4, py + 4, pw - 8, 5);

  // Eye
  ctx.fillStyle = "#fff";
  ctx.shadowBlur = 8;
  ctx.shadowColor = "#fff";
  ctx.fillRect(px + pw - 8, py + 7, 4, 4);

  // Legs (animated)
  const legAnim = PLAYER.onGround ? Math.sin(gameTime * 0.018) * 5 : 0;
  ctx.fillStyle = "#0cf";
  ctx.shadowBlur = 6;
  ctx.fillRect(px + 3, py + ph, 6, 5 + legAnim);
  ctx.fillRect(px + pw - 9, py + ph, 6, 5 - legAnim);

  // Dash glow
  if (PLAYER.dashing) {
    ctx.globalAlpha = 0.5;
    ctx.shadowBlur = 50;
    ctx.shadowColor = "#ff0";
    ctx.fillStyle = "#ff0";
    ctx.fillRect(px - 10, py, pw + 20, ph);
  }

  ctx.restore();
}

function drawScanlines() {
  scanlineOffset = (scanlineOffset + 0.5) % 4;
  ctx.save();
  ctx.globalAlpha = 0.025;
  ctx.fillStyle = "#000";
  for (let y = scanlineOffset; y < H; y += 4) {
    ctx.fillRect(0, y, W, 2);
  }
  ctx.restore();
}

function drawVignette() {
  const grd = ctx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.9);
  grd.addColorStop(0, "rgba(0,0,0,0)");
  grd.addColorStop(1, "rgba(0,0,0,0.65)");
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

// ─────────────────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────────────────
function loop(now) {
  requestAnimationFrame(loop);
  if (!lastTime) lastTime = now;
  const dt = Math.min(now - lastTime, 50);
  lastTime = now;

  if (dead) { render(); return; }

  gameTime += dt * timeScale;
  score += dt * 0.01 * timeScale;

  // Speed ramp
  worldSpeed = CONFIG.speed + Math.min(5, gameTime * 0.0002);
  if (!PLAYER.dashing) PLAYER.vx = worldSpeed;

  // Slow-mo decay
  if (slowMoTimer > 0) {
    slowMoTimer -= dt;
    if (slowMoTimer <= 0) { timeScale = 1; slowMoTimer = 0; }
  }

  updatePlayer(dt);
  updateCamera();
  updateParticles(dt);
  extendPlatforms();
  prunePlatforms();
  updateLyrics(dt);
  render();
}

// ─────────────────────────────────────────────────────────
//  MODE TOGGLE
// ─────────────────────────────────────────────────────────
function toggleMode() {
  mode = mode === "game" ? "content" : "game";
  CONFIG.mode = mode;
  document.getElementById("mode-badge").textContent =
    mode === "game" ? "GAME MODE" : "CONTENT MODE";
  document.getElementById("mode-toggle").textContent =
    mode === "game" ? "CONTENT MODE" : "GAME MODE";
  document.getElementById("score-display").style.opacity = mode === "game" ? "0.9" : "0";
}

// ─────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────
function init() {
  PLAYER.y = GROUND_Y - 60;
  PLAYER.vx = worldSpeed;
  initPlatforms();
  showHookText();
  requestAnimationFrame(loop);
}

init();
</script>
